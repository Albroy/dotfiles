# Fast session switching using fzf
bind f run-shell -b "tmux list-sessions -F '##S' | fzf-tmux --preview 'tmux capture-pane -ep -t {}' --preview-window=right:55%:wrap | xargs -r tmux switch -t"

# Chord tables (prefix = C-b):  j … = JOIN/attach   u … = UNLINK/detach   (never delete)
bind j switch-client -T joinmode
bind u switch-client -T detachmode

# C-b j w : link a window from another session into this one
bind -T joinmode w run-shell -b "tmux lsw -a -F \"##{window_id}:##S:##I:##W\" | grep -v \"^$(tmux lsw -t $(tmux display-message -p \"##{window_id}\") -F \"##{window_id}\")\"| fzf-tmux -w 100% -h 100% --delimiter : --preview 'tmux capture-pane -ep -t {1}' --preview-window=right:70%:wrap | cut -d \":\" -f2-3 | xargs -r tmux link-window -s"

# C-b j p : join a pane from anywhere, split to the RIGHT of current pane
bind -T joinmode p run-shell -b "tmux list-panes -a -F '##{pane_id}:##S:##I:##W:##{pane_current_command}' | grep -v \"^$(tmux display-message -p '##{pane_id}'):\" | fzf-tmux -w 50% -h 35% --delimiter : --preview 'tmux capture-pane -ep -t {1}' --preview-window=right:55%:wrap | cut -d: -f1 | xargs -r tmux join-pane -h -s"

# C-b u w : unlink current window from this session
bind -T detachmode w unlink-window
# (no C-b u p : breaking a pane out = native C-b !)

# C-b y : toggle multi-input (synchronize-panes) on every pane of the window — red bg while ON
bind y if -F '#{pane_synchronized}' \
  'setw synchronize-panes off ; setw window-style default ; display "SYNC OFF"' \
  'setw synchronize-panes on  ; setw window-style "bg=colour52" ; display "⚠ SYNC ON — typing to ALL panes"'

# Renumber windows after removing one
set -g renumber-windows on

# Reload bashrc, return to current dir
bind r send-keys "reload" Enter


# Keep plenty of history for scrollback
set -g history-limit 50000


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'


set -g @plugin 'niqodea/tmux-matryoshka'
set -g @plugin 'janoamaral/tokyo-night-tmux'

set -g @tokyo-night-tmux_nerdfonts 'on'
set -g @tokyo-night-tmux_show_netspeed 1


set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative # 'relative' or 'full'

set -g @tokyo-night-tmux_time_format 12H
set -g @tokyo-night-tmux_date_format hide


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
